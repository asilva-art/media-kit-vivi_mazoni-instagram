<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="VM+ Arquitetos - presença institucional e acesso a materiais profissionais." />
  <title>VM+ Arquitetos | Presença Institucional</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #171717;
      --line: #2a2a2a;
      --text: #e7e7e2;
      --muted: #9f9f93;
      --gold: #c9a84c;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .card {
      width: 100%;
      max-width: 860px;
      border: 1px solid var(--line);
      background: var(--card);
      padding: 36px 30px;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 14px;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 500;
      font-size: clamp(36px, 6vw, 52px);
      line-height: 1.08;
    }
    p { margin: 0 0 20px; color: var(--muted); font-size: 16px; line-height: 1.65; max-width: 66ch; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .btn {
      display: inline-block;
      border: 1px solid var(--gold);
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 14px;
      transition: background-color .2s ease;
    }
    .btn:hover { background: rgba(201,168,76,.12); }
    .sub {
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <p class="eyebrow">VM + Arquitetos</p>
      <h1>Presença Institucional</h1>
      <p>
        Página inicial institucional da VM+ Arquitetos. Materiais técnico-comerciais ficam disponíveis por links dedicados.
      </p>
      <div class="actions">
        <a class="btn" href="/profissional/propostas/viviane-mazoni-baracho-2026/">Acessar Proposta Técnica</a>
      </div>
      <div class="sub">vmarquitetos.com · Conteúdo profissional com rotas organizadas</div>
    </section>
  </main>
</body>
</html>
